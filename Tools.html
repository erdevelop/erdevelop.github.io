<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* --- ARKA PLAN VE TEMEL AYARLAR --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Siyah Arka Plan */
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* İçeriğin arkasında kalması için */
        }

        /* --- LİNK TASARIMI --- */
        ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            max-width: 900px;
            position: relative;
            z-index: 1;
        }

        ul li a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03); /* Çok hafif şeffaf gri */
            padding: 12px 24px;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); /* Cam efekti */
            display: inline-block;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        ul li a:hover {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            transform: translateY(-5px); /* Yukarı kayma efekti */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <ul>

    </ul>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 100,
                    "density": { "enable": true, "value_area": 800 }
                },
                "color": { "value": "#888888" }, /* Gri noktalar */
                "shape": { "type": "circle" },
                "opacity": {
                    "value": 0.4,
                    "random": true
                },
                "size": {
                    "value": 3,
                    "random": true
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#555555", /* Gri çizgiler */
                    "opacity": 0.4,
                    "width": 1,
                    "triangles": {
                        "enable": true, /* İstediğin üçgen efekti */
                        "color": "#222222",
                        "opacity": 0.1
                    }
                },
                "move": {
                    "enable": true,
                    "speed": 1.5,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }, /* Fareyle etkileşim */
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 180, "line_linked": { "opacity": 0.8 } }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
