<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles.js Arka Plan</title>
    <style>
        /* Sayfa sıfırlama ve temel stil */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Kaydırma çubuğunu gizler */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Arka planın rengi ve konumu */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #0d1117; /* Koyu modern bir arka plan */
            z-index: -1; /* İçeriğin arkasında kalması için */
        }

        /* Merkeze yazı eklemek için */
        .content {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
            pointer-events: none; /* Yazının arkasındaki parçacıklara tıklanabilsin diye */
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="content">
        <h1>Efekt2</h1>
        <p>Particles.js</p>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        /* Parçacık Ayarları */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" }, // Nokta rengi
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff", // Çizgi rengi
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 3, // Hareket hızı
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }, // Fare üzerine gelince çizgiler yakalar
                    "onclick": { "enable": true, "mode": "push" }, // Tıklayınca yeni nokta atar
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
