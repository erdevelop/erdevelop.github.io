<!DOCTYPE html>
<html lang="tr">
<head>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    /* Kontrastlı Gri Tonları */
    background: linear-gradient(132deg, #000000, #444444, #999999, #ffffff);
    background-size: 600% 600%; /* Boyutu büyüttük ki hareket alanı artsın */
    animation: randomGradient 10s ease-in-out infinite;
    overflow: hidden;
  }

  /* Daha düzensiz ve rastgele hissettiren animasyon */
  @keyframes randomGradient {
    0% { background-position: 0% 50%; }
    25% { background-position: 100% 0%; }
    50% { background-position: 50% 100%; }
    75% { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
  }

  h1 {
    color: #666; /* Sade gri metin */
    font-size: 4rem;
    font-weight: 900;
    letter-spacing: -2px;
    margin: 0;
    padding: 0;
    user-select: none; /* Metnin seçilmesini engeller, daha temiz durur */
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <h1></h1>
</body>
</html>
