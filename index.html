<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Erdal Üstünol | 30 Years Engineering & Software</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #e0e0e0;
      --accent-gray: #333333;
      --highlight-gray: #888888;
      --glass-bg: rgba(15, 15, 15, 0.85);
      --linkedin-blue: #0077b5;
    }

    #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); z-index: -1; }
    body { margin: 0; color: var(--text-color); font-family: 'Inter', sans-serif; line-height: 1.6; }

    /* --- NAVIGATION / TOP BAR --- */
    .top-bar {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 15px;
        z-index: 1000;
        align-items: center;
    }

    .nav-btn {
        background: var(--glass-bg);
        color: #fff;
        border: 1px solid var(--accent-gray);
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 20px;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        transition: 0.3s;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .nav-btn:hover {
        border-color: var(--highlight-gray);
        background: rgba(255, 255, 255, 0.1);
    }

    .linkedin-btn:hover {
        background: var(--linkedin-blue);
        border-color: var(--linkedin-blue);
    }

    .linkedin-icon {
        width: 16px;
        height: 16px;
        filter: invert(1);
    }

    /* --- HEADER --- */
    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }
    header h1 { font-size: 4rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; color: #fff; }
    header p { font-family: 'Courier New', monospace; color: var(--highlight-gray); font-size: 1.2rem; max-width: 800px; margin-top: 20px; }

    /* --- SECTION --- */
    .section { padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
    h2.section-title { font-size: 2rem; border-bottom: 2px solid var(--accent-gray); padding-bottom: 10px; margin-bottom: 50px; text-align: center; text-transform: uppercase; }

    /* --- SKILLS --- */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .skill-card { background: var(--glass-bg); padding: 20px; border: 1px solid var(--accent-gray); border-radius: 10px; text-align: center; }
    .skill-card h4 { margin: 0 0 10px; color: #fff; }
    .skill-card span { font-size: 0.85rem; color: var(--highlight-gray); }

    /* --- TIMELINE --- */
    .timeline { position: relative; border-left: 2px solid var(--accent-gray); padding-left: 30px; margin-left: 20px; }
    .timeline-item { position: relative; margin-bottom: 60px; }
    .timeline-item::before {
      content: ''; position: absolute; left: -41px; top: 5px;
      width: 20px; height: 20px; background: var(--bg-color); border: 3px solid var(--highlight-gray); border-radius: 50%;
    }
    .timeline-date { color: var(--highlight-gray); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; display: block; }
    .timeline-content { background: var(--glass-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--accent-gray); transition: 0.3s; }
    .timeline-content:hover { border-color: #666; transform: translateX(10px); }
    .timeline-content h3 { margin: 0 0 10px; font-size: 1.4rem; color: #fff; }
    .timeline-content h4 { margin: 0 0 10px; font-size: 1rem; color: var(--highlight-gray); }

    footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid var(--accent-gray); }
    footer ul { list-style: none; padding: 0; }
    footer a { color: #666; text-decoration: none; }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="top-bar">
    <a href="https://www.linkedin.com/in/erdal-%C3%BCst%C3%BCnol-0808018b" target="_blank" class="nav-btn linkedin-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" class="linkedin-icon" alt="LinkedIn">
        <span id="linkedin-text">LinkedIn</span>
    </a>
    <button class="nav-btn" onclick="toggleLanguage()" id="langBtn">TR</button>
  </div>

  <header>
    <h1 id="main-name">Erdal Üstünol</h1>
    <p id="hero-sub">> 30 Years | 3D CAD Expert | Parametric Designer | Developer </p>
  </header>

  <section class="section">
    <h2 class="section-title" id="title-skills">Expertise</h2>
    <div class="skills-grid" id="skills-container"></div>
  </section>

  <section class="section">
    <h2 class="section-title" id="title-journey">Career Journey</h2>
    <div class="timeline" id="timeline-container"></div>
  </section>

  <footer>
    <ul>
      <li><a href="other.html" target="_blank">Tools</a></li>
    </ul>
    <p>© 2026 Erdal Üstünol</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    let currentLang = 'en';

    const translations = {
      en: {
        btn: "TR",
        linkedinText: "LinkedIn",
        heroSub: "> 30 Years | 3D CAD Expert | Parametric Designer | Developer",
        titleSkills: "Expertise",
        titleJourney: "Career Journey",
        skills: [
          { h: "Design for Manufacturing", s: "Technical data and detailed solutions for production" },
          { h: "Parametric 3D CAD", s: "Solidworks, Rhino/Grasshopper, AutoCAD" },
          { h: "Automation", s: "Process optimization with Solidworks VBA, C# & Python" }
        ],
        timeline: [
          { date: "December 2025 - Present", company: "Pasifik Shopfitting", role: "3D CAD Designer", desc: "3D design processes for metal and shopfitting systems oriented towards manufacturing." },
          { date: "April 2019 - December 2025", company: "Metal Yapı", role: "3D Senior Designer", desc: "3D modeling and parametric detail solutions of complex facade systems for production." },
          { date: "September 2022 - April 2023", company: "Indie Mobile Game Developer", role: "Software Developer", desc: "Developing mobile games and applications using Unity and C#." },
          { date: "April 2017 - December 2019", company: "Alform Dizayn", role: "Co-Founder", desc: "3D design services for manufacturing to various companies." },
          { date: "April 2015 - December 2017", company: "Erbay Alüminyum", role: "3D Designer", desc: "3D modeling and parametric detail solutions of complex facade systems." },
          { date: "January 2003 - April 2014", company: "NOVA Advertising", role: "3D Designer", desc: "Over 11 years of 3D design for decoration and advertising. Parametric signage automation with VBA." },
          { date: "September 1997 - April 2001", company: "Foundations", role: "Constructor & Draftsman", desc: "Entry into engineering with aluminum extrusion, hydraulic and pneumatic systems." }
        ]
      },
      tr: {
        btn: "EN",
        linkedinText: "Bağlantı Kur",
        heroSub: "> 30 Yıl | 3D CAD Uzmanı | Parametrik Tasarımcı | Geliştirici",
        titleSkills: "Uzmanlık Alanları",
        titleJourney: "Kariyer Yolculuğu",
        skills: [
          { h: "İmalat İçin Tasarım", s: "Üretilebilir teknik data ve detay çözümleri" },
          { h: "Parametrik 3D CAD", s: "Solidworks, Rhino/Grasshopper, AutoCAD" },
          { h: "Otomasyon", s: "Solidworks VBA & C# & Python ile süreç optimizasyonu" }
        ],
        timeline: [
          { date: "Aralık 2025 - Günümüz", company: "Pasifik Shopfitting", role: "3D CAD Designer", desc: "Metal ve mağaza donanım sistemleri için imalata yönelik 3D tasarım süreçleri" },
          { date: "Nisan 2019 - Aralık 2025", company: "Metal Yapı", role: "3D Senior Designer", desc: "Karmaşık cephe sistemlerinin imalata yönelik 3D modellenmesi ve parametrik detay çözümleri." },
          { date: "Eylül 2022 - Nisan 2023", company: "Indie Mobile Game Developer", role: "Yazılım Geliştirici", desc: "Unity ve C# kullanarak mobil oyun ve uygulamaların geliştirilmesi." },
          { date: "Nisan 2017 - Aralık 2019", company: "Alform Dizayn", role: "Kurucu Ortak", desc: "Firmalara imalata yönelik 3d tasarım hizmetleri" },
          { date: "Nisan 2015 - Aralık 2017", company: "Erbay Alüminyum", role: "3D Designer", desc: "Karmaşık cephe sistemlerinin 3D modellenmesi ve parametrik detay çözümleri." },
          { date: "Ocak 2003 - Nisan 2014", company: "NOVA Reklamcılık", role: "3D Designer", desc: "11 yılı aşkın sürede dekorasyon ve reklamcılık odaklı imalata yönelik 3D tasarım. VBA ile parametrik pano sistemleri otomasyonu." },
          { date: "Eylül 1997 - Nisan 2001", company: "Temeller", role: "Konstrüktör & Teknik Ressam", desc: "Alüminyum ekstrüzyon, hidrolik ve pnömatik sistemler ile mühendislik dünyasına giriş." }
        ]
      }
    };

    function updateContent() {
      const langData = translations[currentLang];
      
      document.getElementById('langBtn').innerText = langData.btn;
      document.getElementById('linkedin-text').innerText = langData.linkedinText;
      document.getElementById('hero-sub').innerText = langData.heroSub;
      document.getElementById('title-skills').innerText = langData.titleSkills;
      document.getElementById('title-journey').innerText = langData.titleJourney;

      const skillsContainer = document.getElementById('skills-container');
      skillsContainer.innerHTML = langData.skills.map(skill => `
        <div class="skill-card">
          <h4>${skill.h}</h4>
          <span>${skill.s}</span>
        </div>
      `).join('');

      const timelineContainer = document.getElementById('timeline-container');
      timelineContainer.innerHTML = langData.timeline.map(item => `
        <div class="timeline-item">
          <span class="timeline-date">${item.date}</span>
          <div class="timeline-content">
            <h3>${item.company}</h3>
            <h4>${item.role}</h4>
            <p>${item.desc}</p>
          </div>
        </div>
      `).join('');
    }

    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'tr' : 'en';
      document.documentElement.lang = currentLang;
      updateContent();
    }

    updateContent();

    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#888888" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.4 },
        "size": { "value": 3, "random": true },
        "line_linked": {
          "enable": true, "distance": 150, "color": "#555555", "opacity": 0.5, "width": 1.5,
          "triangles": { "enable": true, "color": "#222222", "opacity": 0.1 }
        },
        "move": { "enable": true, "speed": 1.2 }
      },
      "interactivity": {
        "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
        "modes": { "grab": { "distance": 200, "line_linked": { "opacity": 1 } } }
      }
    });
  </script>
</body>
</html>
